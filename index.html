<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WALLET.SCORE — On-Chain Reputation</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050507; --surface: #0d0d12; --border: rgba(255,255,255,0.07);
    --text: #f0eee8; --muted: rgba(240,238,232,0.35); --green: #00ff88;
    --blue: #4af0ff; --amber: #ffb800; --red: #ff4455; --score-color: var(--green);
  }
  body {
    font-family: 'Space Mono', monospace; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px 16px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; opacity: 0.6; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }
  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 460px; }
  .header { margin-bottom: 35px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 0.4em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .logo::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }
  h1 { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; line-height: 0.9; letter-spacing: -0.04em; }
  h1 span { color: var(--green); }
  .input-group { margin-top: 30px; }
  input[type="text"] {
    width: 100%; padding: 18px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'Space Mono', monospace;
    outline: none; transition: 0.2s; text-transform: lowercase;
  }
  input:focus { border-color: var(--green); box-shadow: 0 0 15px rgba(0,255,136,0.1); }
  button {
    width: 100%; padding: 18px; background: var(--green); color: #050507; border: none;
    border-radius: 12px; font-family: 'Syne', sans-serif; font-weight: 800; margin-top: 12px;
    cursor: pointer; transition: 0.2s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,255,136,0.2); }
  #results { margin-top: 30px; display: none; animation: slideUp 0.4s ease; }
  .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 30px; text-align: center; }
  .score-num { font-family: 'Syne', sans-serif; font-size: 82px; font-weight: 800; color: var(--score-color); line-height: 1; text-shadow: 0 0 30px var(--score-color); }
  .tier-label { font-size: 12px; color: var(--muted); margin-top: 10px; letter-spacing: 0.2em; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: left; }
  .stat-name { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-top: 5px; }
  footer { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="logo">Mainnet · Live</div>
    <h1>WALLET<span>.</span><br>SCORE</h1>
  </div>

  <div class="input-group">
    <input id="walletInput" type="text" placeholder="0x..." spellcheck="false">
    <button onclick="analyzeWallet()">ANALYZE DATA</button>
  </div>

  <div id="results">
    <div class="score-card">
      <div id="scoreNumber" class="score-num">0</div>
      <div id="scoreTier" class="tier-label">—</div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-name">Total TXs</div><div id="statTx" class="stat-val">—</div></div>
      <div class="stat-box"><div class="stat-name">Wallet Age</div><div id="statAge" class="stat-val">—</div></div>
    </div>
  </div>

  <footer>
    <span>BY @DUKEXBT_</span>
    <span>v2.0_2026</span>
  </footer>
</div>

<script>
  // Hidden API Key (Base64 Obfuscated)
  const _0x1a = 'WDU1RFcxU1Q4RlZEVDg0UktLVTNHOzlFTVRVU1BXMk1YSFA=';
  const K = atob(_0x1a).replace(';', ''); 

  async function analyzeWallet() {
    const addr = document.getElementById('walletInput').value.trim();
    if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) return alert('Invalid Address');

    document.getElementById('results').style.display = 'block';
    
    try {
      const res = await fetch(`https://api.etherscan.io/api?module=proxy&action=eth_getTransactionCount&address=${addr}&tag=latest&apikey=${K}`);
      const data = await res.json();
      const txCount = parseInt(data.result, 16) || 0;

      // RANDOMIZED BUT DECENT (1-500 scale focused)
      let score;
      if (txCount === 0) score = Math.floor(Math.random() * 10) + 5;
      else if (txCount < 50) score = Math.floor(Math.random() * 20) + 40; // 40-60
      else if (txCount < 200) score = Math.floor(Math.random() * 15) + 65; // 65-80
      else score = Math.floor(Math.random() * 10) + 85; // 85-95

      // Smooth Count-up
      let curr = 0;
      const step = setInterval(() => {
        if (curr >= score) { document.getElementById('scoreNumber').innerHTML = score; clearInterval(step); }
        else { curr++; document.getElementById('scoreNumber').innerHTML = curr; }
      }, 15);

      document.getElementById('scoreTier').innerHTML = score > 75 ? 'ELITE REPUTATION' : 'VERIFIED CITIZEN';
      document.getElementById('statTx').innerHTML = txCount;
      document.getElementById('statAge').innerHTML = txCount > 100 ? '1y 4m' : 'New';

    } catch (e) { console.error(e); }
  }
</script>
</body>
</html>
