<!-- Obfuscated API key -->
<script>
  // Split + Base64 trick to hide key
  const part1 = 'WDVEVzFTVDhG';
  const part2 = 'VkRUIDg0UktL';
  const part3 = 'VTM3OUVNVFRV';
  const part4 = 'U1BXMk1YSFA=';
  const API_KEY = atob(part1 + part2 + part3 + part4);
  const BASE = 'https://api.etherscan.io/api';

  // Your original functions below — unchanged
  function $(id) { return document.getElementById(id); }

  function scoreColor(score) {
    if (score >= 80) return 'var(--green)';
    if (score >= 55) return 'var(--blue)';
    if (score >= 30) return 'var(--amber)';
    return 'var(--red)';
  }

  function scoreTier(score) {
    if (score >= 80) return 'ELITE';
    if (score >= 65) return 'STRONG';
    if (score >= 45) return 'DECENT';
    if (score >= 25) return 'EARLY';
    return 'GHOST';
  }

  function countUp(el, target, duration = 800) {
    const start = performance.now();
    const from = parseInt(el.textContent) || 0;
    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      el.textContent = Math.round(from + (target - from) * ease);
      if (t < 1) requestAnimationFrame(step);
      else el.textContent = target;
    }
    requestAnimationFrame(step);
  }

  function showError(msg) {
    const box = $('errorBox');
    box.textContent = '⚠ ' + msg;
    box.style.display = 'block';
  }

  function hideError() {
    $('errorBox').style.display = 'none';
  }

  async function etherscan(params) {
    const url = new URL(BASE);
    Object.entries({ ...params, apikey: API_KEY }).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString());
    if (!res.ok) throw new Error(`HTTP ${res.status}: Network error`);
    const data = await res.json();
    if (data.result === 'Max rate limit reached') throw new Error('Rate limit reached — wait a moment and try again.');
    return data;
  }

  async function analyzeWallet() {
    const address = $('walletInput').value.trim();
    hideError();

    if (!/^0x[a-fA-F0-9]{40}$/.test(address)) {
      showError('Invalid ETH address. Must start with 0x followed by 40 hex characters.');
      return;
    }

    const btn = $('analyzeBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-text"><span class="loader"><span></span><span></span><span></span></span></span>';
    $('results').style.display = 'none';

    try {
      const balData = await etherscan({ module: 'account', action: 'balance', address, tag: 'latest' });
      const balWei = (balData.status === '1' || balData.result) ? (parseInt(balData.result) || 0) : 0;
      const balEth = balWei / 1e18;

      const txData = await etherscan({
        module: 'account',
        action: 'txlist',
        address,
        startblock: 0,
        endblock: 99999999,
        page: 1,
        offset: 100,
        sort: 'asc'
      });

      const txList = Array.isArray(txData.result) ? txData.result : [];
      const nonceData = await etherscan({ module: 'proxy', action: 'eth_getTransactionCount', address, tag: 'latest' });
      const outgoingCount = nonceData.result ? (parseInt(nonceData.result, 16) || 0) : 0;

      const daySet = new Set();
      txList.forEach(tx => {
        const d = new Date(parseInt(tx.timeStamp) * 1000);
        daySet.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
      });
      const uniqueDays = daySet.size;

      let ageDays = 0;
      let ageLabel = '< 1 day';
      if (txList.length > 0) {
        const firstTx = parseInt(txList[0].timeStamp) * 1000;
        ageDays = Math.floor((Date.now() - firstTx) / 86400000);
        if (ageDays >= 365) ageLabel = `${Math.floor(ageDays/365)}y ${Math.floor((ageDays%365)/30)}m`;
        else if (ageDays >= 30) ageLabel = `${Math.floor(ageDays/30)}mo`;
        else ageLabel = `${ageDays}d`;
      }

      let activityScore = 0;
      if (outgoingCount >= 500) activityScore = 30;
      else if (outgoingCount >= 100) activityScore = Math.round(20 + (outgoingCount - 100) / 400 * 10);
      else if (outgoingCount >= 20)  activityScore = Math.round(10 + (outgoingCount - 20) / 80 * 10);
      else if (outgoingCount >= 1)   activityScore = Math.round(3 + (outgoingCount / 20) * 7);

      let consistencyScore = 0;
      if (ageDays > 0) {
        const ratio = uniqueDays / Math.min(ageDays, 365);
        consistencyScore = Math.round(Math.min(ratio * 2, 1) * 25);
      } else if (uniqueDays > 0) {
        consistencyScore = 10;
      }

      let ageScore = 0;
      if (ageDays >= 1095) ageScore = 25;
      else if (ageDays >= 730) ageScore = 22;
      else if (ageDays >= 365) ageScore = 18;
      else if (ageDays >= 180) ageScore = 13;
      else if (ageDays >= 60)  ageScore = 8;
      else if (ageDays >= 14)  ageScore = 4;
      else if (ageDays >= 1)   ageScore = 2;

      let balScore = 0;
      if (balEth >= 10)   balScore = 20;
      else if (balEth >= 1)   balScore = 16;
      else if (balEth >= 0.1) balScore = 11;
      else if (balEth >= 0.01) balScore = 6;
      else if (balEth > 0)    balScore = 2;

      const finalScore = Math.min(activityScore + consistencyScore + ageScore + balScore, 100);
      const color = scoreColor(finalScore);
      const tier = scoreTier(finalScore);

      $('results').style.display = 'block';
      document.querySelector('.score-card').style.setProperty('--score-color', color);
      $('scoreNumber').style.color = color;
      $('scoreNumber').style.textShadow = `0 0 40px ${color}`;
      $('scoreTier').style.color = color;
      document.querySelector('.bar-fill').style.background = color;
      document.querySelector('.bar-fill').style.boxShadow = `0 0 12px ${color}`;

      countUp($('scoreNumber'), finalScore, 1000);
      $('scoreTier').textContent = tier;

      setTimeout(() => { $('barFill').style.width = finalScore + '%'; }, 100);
      $('walletTag').textContent = address;

      $('statTx').textContent = outgoingCount > 0 ? outgoingCount.toLocaleString() + '+' : txList.length.toString();
      $('statTx').className = 'stat-val ' + (outgoingCount >= 100 ? 'positive' : 'neutral');

      $('statDays').textContent = uniqueDays || '0';
      $('statDays').className = 'stat-val ' + (uniqueDays >= 30 ? 'positive' : 'neutral');

      $('statAge').textContent = txList.length > 0 ? ageLabel : 'New';
      $('statAge').className = 'stat-val ' + (ageDays >= 365 ? 'positive' : ageDays >= 60 ? 'neutral' : 'warning');

      $('statBal').textContent = balEth >= 0.001 ? balEth.toFixed(4) + ' ETH' : '< 0.001 ETH';
      $('statBal').className = 'stat-val ' + (balEth >= 1 ? 'positive' : balEth > 0 ? 'neutral' : 'warning');

      setTimeout(() => {
        $('b1').style.width = (activityScore / 30 * 100) + '%';
        $('b2').style.width = (consistencyScore / 25 * 100) + '%';
        $('b3').style.width = (ageScore / 25 * 100) + '%';
        $('b4').style.width = (balScore / 20 * 100) + '%';
      }, 200);

      $('b1v').textContent = activityScore + '/30';
      $('b2v').textContent = consistencyScore + '/25';
      $('b3v').textContent = ageScore + '/25';
      $('b4v').textContent = balScore + '/20';

    } catch (err) {
      showError(err.message || 'Failed to fetch on-chain data. Try again shortly.');
      console.error('[WALLET.SCORE ERROR]', err);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span class="btn-text">ANALYZE WALLET</span>';
    }
  }

  $('walletInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') analyzeWallet();
  });
</script>
