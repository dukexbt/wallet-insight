<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wallet Insight | @dukexbt_</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root { --primary: #7f5af0; --accent: #00c6ff; --bg: #020617; }
  
  body { 
    margin: 0; font-family: 'Inter', sans-serif; 
    background: var(--bg); color: white; 
    display: flex; justify-content: center; align-items: center; 
    min-height: 100vh; overflow: hidden;
  }

  /* Animated Mesh Gradient Background */
  .bg-animate {
    position: absolute; width: 100%; height: 100%;
    background: linear-gradient(45deg, #0f172a, #020617, #1e1b4b);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    z-index: -1;
  }
  @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  /* Sleek Glass Container */
  .container { 
    text-align: center; width: 90%; max-width: 420px; 
    padding: 40px; border-radius: 32px; 
    background: rgba(255, 255, 255, 0.03); 
    backdrop-filter: blur(20px); 
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.8s ease-out;
  }

  h1 { font-size: 32px; margin-bottom: 5px; font-weight: 600; letter-spacing: -1.5px; }
  .subtitle { opacity: 0.5; margin-bottom: 30px; font-size: 13px; }

  input { 
    width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 16px; 
    border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0,0,0,0.2); 
    color: white; box-sizing: border-box; outline: none; transition: 0.3s;
  }
  input:focus { border-color: var(--primary); background: rgba(0,0,0,0.3); }

  button { 
    width: 100%; padding: 16px; border-radius: 16px; border: none; 
    background: linear-gradient(135deg, var(--accent), var(--primary)); 
    color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(127, 90, 240, 0.3); }

  /* Animated Score Logic */
  .result { 
    margin-top: 25px; padding: 25px; border-radius: 20px; 
    background: rgba(127, 90, 240, 0.1); border: 1px solid rgba(127, 90, 240, 0.2);
    display: none; animation: slideUp 0.5s ease-out;
  }

  .score-display { 
    font-size: 48px; font-weight: 700; color: var(--accent); 
    margin: 10px 0; display: block;
  }

  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  footer { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
  .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 10px; }
</style>
</head>
<body>

<div class="bg-animate"></div>

<div class="container">
  <h1>Wallet Insight</h1>
  <p class="subtitle">Real-time analysis by @dukexbt_</p>

  <input id="wallet" placeholder="Paste ETH Address (0x...)" type="text">
  <button id="btn" onclick="checkWallet()">Analyze Activity</button>

  <div id="output" class="result">
    <p style="margin:0; font-size:12px; opacity:0.6; letter-spacing:1px;">TRANSACTION SCORE</p>
    <span id="digitScore" class="score-display">0</span>
    <div id="details" style="font-size:14px; opacity:0.8;"></div>
  </div>

  <footer>
    <img src="https://unavatar.io/x/dukexbt_" class="profile-img" alt="Duke">
    <br>
    <a href="https://x.com/dukexbt_" target="_blank" style="color:var(--primary); text-decoration:none; font-weight:600;">
      built by @dukexbt_
    </a>
  </footer>
</div>

<script>
async function checkWallet() {
  const address = document.getElementById('wallet').value.trim();
  const output = document.getElementById('output');
  const btn = document.getElementById('btn');
  const scoreText = document.getElementById('digitScore');
  const details = document.getElementById('details');

  if (!/^0x[a-fA-F0-9]{40}$/.test(address)) {
    alert('Invalid ETH address');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = 'Connecting to Chain...';
  output.style.display = 'block';
  scoreText.innerHTML = '...';

  try {
    const apiKey = 'X5DW1ST8FVDT84RKKU3G79EMTUSPW2MXHP';
    const url = `https://api.etherscan.io/api?module=account&action=txlist&address=${address}&startblock=0&endblock=99999999&page=1&offset=100&sort=desc&apikey=${apiKey}`;

    const res = await fetch(url);
    const data = await res.json();
    const txCount = (data.result || []).length;

    // Calculate dynamic digit score (0-100)
    let finalScore = Math.min(txCount, 100);
    
    // Animation logic for digits
    let current = 0;
    const interval = setInterval(() => {
      if (current >= finalScore) {
        clearInterval(interval);
      } else {
        current++;
        scoreText.innerHTML = current;
      }
    }, 20);

    details.innerHTML = `Found <strong>${txCount}</strong> transactions. <br> Status: ${finalScore > 70 ? 'Power User' : 'Active User'}`;

  } catch (err) {
    scoreText.innerHTML = 'Error';
    details.innerHTML = 'Failed to fetch data.';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analyze Activity';
  }
}
</script>
</body>
</html>
