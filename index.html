<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wallet Insight | @dukexbt_</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root { --primary: #7f5af0; --accent: #00c6ff; --bg: #030712; }
  body { 
    margin: 0; font-family: 'Inter', sans-serif; 
    background: radial-gradient(circle at top right, #1e1b4b, #030712); 
    color: white; display: flex; justify-content: center; align-items: center; 
    min-height: 100vh; overflow: hidden;
  }
  .container { 
    text-align: center; width: 90%; max-width: 400px; 
    padding: 45px 35px; border-radius: 28px; 
    background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); 
    border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  }
  h1 { font-size: 28px; margin-bottom: 8px; font-weight: 800; letter-spacing: -1px; }
  .subtitle { opacity: 0.4; margin-bottom: 35px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
  input { 
    width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 14px; 
    border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); 
    color: white; box-sizing: border-box; outline: none; font-size: 14px;
  }
  button { 
    width: 100%; padding: 18px; border-radius: 14px; border: none; 
    background: #fff; color: #000; font-weight: 700; cursor: pointer; font-size: 15px; transition: 0.2s;
  }
  button:hover { opacity: 0.9; transform: scale(1.02); }
  .result { margin-top: 30px; padding: 25px; border-radius: 20px; background: rgba(255, 255, 255, 0.02); display: none; }
  .score-display { font-size: 68px; font-weight: 800; color: #fff; margin: 5px 0; display: block; }
  footer { margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 25px; }
  .profile-img { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
  .built-by { font-size: 12px; color: rgba(255,255,255,0.3); text-decoration: none; font-weight: 600; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="container">
  <h1>Wallet Insight</h1>
  <p class="subtitle">Mainnet Protocol • 2026</p>
  <input id="wallet" placeholder="Paste ETH Address..." type="text" spellcheck="false">
  <button id="btn" onclick="checkWallet()">Analyze Wallet</button>
  <div id="output" class="result">
    <span id="digitScore" class="score-display">0</span>
    <div id="details" style="font-size:13px; opacity:0.5; line-height:1.6;"></div>
  </div>
  <footer>
    <img src="https://unavatar.io/x/dukexbt_" class="profile-img" alt="Duke">
    <br>
    <a href="https://x.com/dukexbt_" target="_blank" class="built-by">SYSTEM DESIGN BY @DUKEXBT_</a>
  </footer>
</div>

<script>
  async function checkWallet() {
    const address = document.getElementById('wallet').value.trim();
    const output = document.getElementById('output');
    const btn = document.getElementById('btn');
    const scoreText = document.getElementById('digitScore');
    const details = document.getElementById('details');

    if (!/^0x[a-fA-F0-9]{40}$/.test(address)) { alert('Invalid Address'); return; }

    btn.disabled = true; btn.innerHTML = 'Calculating...';
    output.style.display = 'block'; scoreText.innerHTML = '0';

    try {
      const apiKey = 'X5DW1ST8FVDT84RKKU3G79EMTUSPW2MXHP';
      const url = `https://api.etherscan.io/api?module=proxy&action=eth_getTransactionCount&address=${address}&tag=latest&apikey=${apiKey}`;
      const res = await fetch(url);
      const data = await res.json();
      
      let txCount = parseInt(data.result, 16) || 0;
      
      // DECENT RANDOMIZED LOGIC (Range 1-500 focused)
      let base;
      if (txCount === 0) {
          base = Math.floor(Math.random() * 15) + 5; // New wallets get 5-20
      } else if (txCount < 100) {
          base = Math.floor(Math.random() * 20) + 45; // 1-99 txns get 45-65 (Decent!)
      } else if (txCount < 500) {
          base = Math.floor(Math.random() * 20) + 70; // 100-499 txns get 70-90 (Strong!)
      } else {
          base = Math.floor(Math.random() * 10) + 90; // 500+ txns get 90-100 (Elite!)
      }

      let finalScore = Math.min(base, 100);

      // Smooth Count-up
      let current = 0;
      const interval = setInterval(() => {
        if (current >= finalScore) { scoreText.innerHTML = finalScore; clearInterval(interval); }
        else { current++; scoreText.innerHTML = current; }
      }, 10);

      details.innerHTML = `Transaction Density: <b>${txCount}</b><br>Network Reputation: <b>Verified</b>`;
    } catch (err) { scoreText.innerHTML = '--'; }
    finally { btn.disabled = false; btn.innerHTML = 'Analyze Wallet'; }
  }
</script>
</body>
</html>
