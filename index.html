<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WALLET.SCORE — On-Chain Reputation</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050507; --surface: #0d0d12; --border: rgba(255,255,255,0.07);
    --text: #f0eee8; --muted: rgba(240,238,232,0.35); --green: #00ff88;
    --amber: #ffb800; --red: #ff4455; --blue: #4af0ff; --score-color: var(--green);
  }
  body {
    font-family: 'Space Mono', monospace; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px 16px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; opacity: 0.6; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }
  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 480px; }
  .header { margin-bottom: 40px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .logo::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(32px, 7vw, 48px); font-weight: 800; line-height: 1; color: var(--text); }
  h1 span { color: var(--green); }
  .input-label { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
  input[type="text"] { width: 100%; padding: 16px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; outline: none; transition: 0.2s; }
  input[type="text"]:focus { border-color: rgba(0,255,136,0.3); box-shadow: 0 0 0 3px rgba(0,255,136,0.06); }
  button#analyzeBtn { width: 100%; padding: 17px; background: var(--green); color: #050507; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: 10px; }
  #results { margin-top: 28px; display: none; }
  .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px 28px; margin-bottom: 16px; position: relative; }
  .score-number { font-family: 'Syne', sans-serif; font-size: 80px; font-weight: 800; color: var(--score-color); line-height: 1; text-shadow: 0 0 40px var(--score-color); }
  .score-tier { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--score-color); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 16px; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); }
  .share-btn { width: 100%; padding: 14px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; margin-top: 10px;}
  .share-btn:hover { background: #111; border-color: var(--muted); }
  footer { margin-top: 40px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: rgba(240,238,232,0.2); border-top: 1px solid var(--border); padding-top: 20px; }
  footer a { color: var(--green); text-decoration: none; font-weight: 800; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="logo">Mainnet · ETH · Live</div>
    <h1>WALLET<span>.</span><br>SCORE</h1>
    <p class="sub">On-chain reputation analysis by @dukexbt_</p>
  </div>

  <label class="input-label">ETH Address</label>
  <input id="walletInput" type="text" placeholder="0x..." spellcheck="false">
  <button id="analyzeBtn" onclick="analyzeWallet()">ANALYZE WALLET</button>

  <div id="results">
    <div class="score-card">
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div id="scoreNumber" class="score-number">0</div>
        <div style="text-align:right">
          <div style="font-size:10px; color:var(--muted); text-transform:uppercase;">Reputation Tier</div>
          <div id="scoreTier" class="score-tier">—</div>
        </div>
      </div>
      <button class="share-btn" onclick="shareOnX()">SHARE ON X</button>
    </div>

    <div class="stats-grid">
      <div class="stat-box"><div style="font-size:10px; color:var(--muted);">TOTAL TXS</div><div id="statTx" class="stat-val">—</div></div>
      <div class="stat-box"><div style="font-size:10px; color:var(--muted);">WALLET AGE</div><div id="statAge" class="stat-val">—</div></div>
    </div>
  </div>

  <footer>
    <span>WALLET.SCORE © 2026</span>
    <a href="https://x.com/dukexbt_" target="_blank">@DUKEXBT_</a>
  </footer>
</div>

<script>
  const API_KEY = 'X5DW1ST8FVDT84RKKU3G79EMTUSPW2MXHP';
  let currentScore = 0;

  function $(id) { return document.getElementById(id); }

  async function analyzeWallet() {
    const address = $('walletInput').value.trim();
    if (!/^0x[a-fA-F0-9]{40}$/.test(address)) return alert('Invalid ETH address');

    $('analyzeBtn').disabled = true;
    $('analyzeBtn').innerText = 'SCANNING...';

    try {
      const nonceData = await fetch(`https://api.etherscan.io/api?module=proxy&action=eth_getTransactionCount&address=${address}&tag=latest&apikey=${API_KEY}`).then(r => r.json());
      const txCount = parseInt(nonceData.result, 16) || 0;
      
      // Decent Scoring Logic for 1-500 range
      let score = 0;
      if (txCount === 0) score = Math.floor(Math.random() * 10) + 5;
      else if (txCount < 50) score = Math.floor(Math.random() * 20) + 40; 
      else if (txCount < 200) score = Math.floor(Math.random() * 15) + 65; 
      else score = Math.floor(Math.random() * 10) + 85;

      currentScore = score;
      $('results').style.display = 'block';
      $('scoreNumber').innerText = score;
      $('scoreTier').innerText = score > 80 ? 'ELITE' : score > 60 ? 'STRONG' : 'DECENT';
      $('statTx').innerText = txCount;
      $('statAge').innerText = txCount > 100 ? '1y 2m' : 'Active';

    } catch (e) { alert('API Error'); } 
    finally { 
      $('analyzeBtn').disabled = false; 
      $('analyzeBtn').innerText = 'ANALYZE WALLET';
    }
  }

  function shareOnX() {
    const text = encodeURIComponent(`My on-chain reputation score is ${currentScore}/100! 🛡️\n\nAnalyzed via WALLET.SCORE by @dukexbt_\n\nCheck yours here: ${window.location.href}`);
    window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
  }
</script>
</body>
</html>
