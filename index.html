<script>
  const TIER_CONFIG = [
    { min: 0,  max: 20,  label: 'DORMANT',   color: '#ff4d6d', bg: 'rgba(255,77,109,0.12)', cls: 'Minimal' },
    { min: 21, max: 44,  label: 'EMERGING',  color: '#ffb347', bg: 'rgba(255,179,71,0.12)',  cls: 'Low' },
    { min: 45, max: 69,  label: 'ACTIVE',    color: '#7b61ff', bg: 'rgba(123,97,255,0.14)', cls: 'Moderate' },
    { min: 70, max: 89,  label: 'STRONG',    color: '#00ffe0', bg: 'rgba(0,255,224,0.12)',   cls: 'High' },
    { min: 90, max: 100, label: 'ELITE',     color: '#ffffff', bg: 'rgba(255,255,255,0.1)',  cls: 'Elite' },
  ];

  function getTier(score) {
    return TIER_CONFIG.find(t => score >= t.min && score <= t.max) || TIER_CONFIG[0];
  }

  async function checkWallet() {
    const address = document.getElementById('wallet').value.trim();
    const output = document.getElementById('output');
    const btn = document.getElementById('btn');
    const scoreEl = document.getElementById('digitScore');
    const scoreBar = document.getElementById('scoreBar');
    const tierBadge = document.getElementById('tierBadge');
    const inp = document.getElementById('wallet');

    // Basic Ethereum Address Validation
    if (!/^0x[a-fA-F0-9]{40}$/.test(address)) {
      inp.classList.remove('shake');
      void inp.offsetWidth;
      inp.classList.add('shake');
      inp.style.borderColor = 'rgba(255,77,109,0.5)';
      setTimeout(() => { inp.style.borderColor = ''; inp.classList.remove('shake'); }, 600);
      return;
    }

    // UI Reset
    btn.disabled = true;
    btn.textContent = 'Scanning...';
    output.style.display = 'block';
    scoreEl.textContent = '—';
    scoreBar.style.width = '0%';
    tierBadge.textContent = '';
    document.getElementById('timestamp').textContent = new Date().toISOString().slice(11,19) + ' UTC';
    document.getElementById('statTx').textContent = '—';
    document.getElementById('statStatus').textContent = '—';
    document.getElementById('statBalance').textContent = '—';
    document.getElementById('statClass').textContent = '—';

    try {
      // ---------------------------------------------------------
      // 👇 PASTE YOUR ETHERSCAN API KEY INSIDE THE QUOTES BELOW 👇
      // ---------------------------------------------------------
      const apiKey = 'X5DW1ST8FVDT84RKKU3G79EMTUSPW2MXHP'; 

      // 1. Fetch Transaction Count
      const txUrl = `https://api.etherscan.io/api?module=proxy&action=eth_getTransactionCount&address=${address}&tag=latest&apikey=${apiKey}`;
      const txRes = await fetch(txUrl);
      const txData = await txRes.json();
      
      // Catch Etherscan API Errors (e.g., Invalid API key)
      if (txData.status === "0" || txData.message === "NOTOK") {
          throw new Error(txData.result || "Etherscan API blocked the request.");
      }

      // Convert hex result to integer
      const txCount = parseInt(txData.result, 16) || 0;

      // 2. Fetch ETH Balance
      const balUrl = `https://api.etherscan.io/api?module=account&action=balance&address=${address}&tag=latest&apikey=${apiKey}`;
      const balRes = await fetch(balUrl);
      const balData = await balRes.json();
      
      if (balData.status === "0" && balData.message === "NOTOK") {
          throw new Error(balData.result);
      }

      const balanceWei = balData.result || 0;
      const balanceEth = balanceWei / 1e18; // Convert Wei to ETH

      // --- ALGORITHM LOGIC ---
      let txScore = 0;
      if (txCount >= 250) txScore = 55;
      else if (txCount >= 50) txScore = 25 + ((txCount - 50) / 450) * 25; 
      else txScore = (txCount / 50) * 25;

      let volScore = 0;
      if (balanceEth >= 10) volScore = 50; 
      else if (balanceEth >= 1) volScore = 25 + ((balanceEth - 1) / 9) * 25; 
      else volScore = (balanceEth / 1) * 25;

      // Combine and cap between 0 and 100
      const finalScore = Math.min(Math.max(Math.round(txScore + volScore), 0), 100);
      const tier = getTier(finalScore);

      // Animate count-up
      let current = 0;
      const step = Math.ceil(finalScore / 60) || 1;
      const interval = setInterval(() => {
        current = Math.min(current + step, finalScore);
        scoreEl.textContent = current;
        if (current >= finalScore) {
          clearInterval(interval);
          // Animate the progress bar and badge
          setTimeout(() => {
            scoreBar.style.width = finalScore + '%';
            scoreEl.style.color = tier.color;
            scoreEl.style.textShadow = `0 0 40px ${tier.color}55`;
            tierBadge.textContent = tier.label;
            tierBadge.style.color = tier.color;
            tierBadge.style.background = tier.bg;
            tierBadge.style.border = `1px solid ${tier.color}44`;
          }, 80);
        }
      }, 18);

      // Populate Stats
      document.getElementById('statTx').textContent = txCount.toLocaleString();
      document.getElementById('statStatus').textContent = 'VERIFIED ✓';
      document.getElementById('statStatus').style.color = 'var(--accent)';
      document.getElementById('statBalance').textContent = balanceEth > 0 ? balanceEth.toFixed(4) + ' ETH' : '0 ETH';
      
      // Dynamic Classification based on the score
      let classification = 'Dormant';
      if (finalScore >= 80) classification = 'Whale / Power User';
      else if (finalScore >= 50) classification = 'Active Trader';
      else if (finalScore >= 20) classification = 'Casual User';
      
      document.getElementById('statClass').textContent = classification;

    } catch (err) {
      console.error("Etherscan API Error:", err);
      alert("API Error: " + err.message + "\n\nPlease check if your API key is correct.");
      scoreEl.textContent = 'ERR';
      scoreEl.style.color = 'var(--danger)';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Analyze Wallet';
    }
  }

  // Enter key support
  document.getElementById('wallet').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkWallet();
  });
</script>
