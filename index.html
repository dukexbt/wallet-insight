<script>
async function checkWallet() {
  const address = document.getElementById('wallet').value.trim();
  const output = document.getElementById('output');
  const btn = document.getElementById('btn');
  const scoreEl = document.getElementById('digitScore');
  const scoreBar = document.getElementById('scoreBar');
  const tierBadge = document.getElementById('tierBadge');
  const inp = document.getElementById('wallet');

  if (!/^0x[a-fA-F0-9]{40}$/.test(address)) {
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Scanning...';
  output.style.display = 'block';

  try {
    const apiKey = "EZDX5VYQSFZ7X9RIPUKFKIZF98Q6QJ7UE6";

    const url = `https://api.etherscan.io/api?module=account&action=txlist&address=${address}&startblock=0&endblock=99999999&sort=asc&apikey=${apiKey}`;
    const res = await fetch(url);
    const data = await res.json();

    // 🚨 SAFE CHECK
    if (data.status !== "1" || !Array.isArray(data.result)) {
      throw new Error("Invalid API response");
    }

    const txs = data.result;
    const txCount = txs.length;

    // Volume
    let totalVolume = 0;
    for (let tx of txs) {
      totalVolume += Number(tx.value) / 1e18;
    }

    // Age
    const firstTx = txs[0];
    const walletAgeDays = firstTx
      ? (Date.now()/1000 - Number(firstTx.timeStamp)) / 86400
      : 0;

    // Score
    let score = 0;
    score += Math.min(txCount / 200, 1) * 25;
    score += Math.min(totalVolume / 100, 1) * 35;
    score += Math.min(walletAgeDays / 365, 1) * 20;
    if (txCount > 300 && totalVolume > 50) score += 20;

    const finalScore = Math.round(Math.min(score, 100));
    const tier = getTier(finalScore);

    // UI update (no animation first — keep stable)
    scoreEl.textContent = finalScore;
    scoreBar.style.width = finalScore + '%';

    tierBadge.textContent = tier.label;
    tierBadge.style.color = tier.color;
    tierBadge.style.background = tier.bg;

    document.getElementById('statTx').textContent = txCount.toLocaleString();
    document.getElementById('statStatus').textContent = 'VERIFIED ✓';
    document.getElementById('statNetwork').textContent = 'ETH MAINNET';
    document.getElementById('statClass').textContent =
      totalVolume > 100 ? "Whale" :
      txCount > 300 ? "Power User" :
      "EOA";

  } catch (err) {
    console.error(err);

    // 👇 SHOW ERROR IN UI INSTEAD OF CRASH
    scoreEl.textContent = '0';
    document.getElementById('statStatus').textContent = 'API ERROR';
    document.getElementById('statStatus').style.color = 'var(--danger)';
  }

  btn.disabled = false;
  btn.textContent = 'Analyze Wallet';
}
</script>
